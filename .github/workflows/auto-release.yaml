name: '📦 Auto Build & Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.6)'
        required: true
        type: string
      target:
        description: 'Target branch/commit for the release tag when creating it'
        required: false
        default: 'master'
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve tag/version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Tag is required"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          TARGET: ${{ inputs.target }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally"
          else
            git tag "$TAG" "$TARGET"
            git push origin "$TAG"
          fi

      - name: Build plugin
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore Jellyfin.Plugin.Discogs.sln
          dotnet build Jellyfin.Plugin.Discogs.sln -c Release --no-restore

      - name: Package artifacts
        id: pkg
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          OUTDIR="dist"
          mkdir -p "$OUTDIR"

          DLL_PATH="Jellyfin.Plugin.Discogs/bin/Release/net9.0/Jellyfin.Plugin.Discogs.dll"
          ZIP_NAME="discogs_${VERSION}.zip"
          ZIP_PATH="$OUTDIR/$ZIP_NAME"

          if [[ ! -f "$DLL_PATH" ]]; then
            echo "Expected plugin DLL not found: $DLL_PATH"
            exit 1
          fi

          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          META_PATH="$OUTDIR/meta.json"
          cat > "$META_PATH" <<EOF
          {
            "category": "Music",
            "changelog": "- Jellyfin 10.11 support (#15) @crobibero",
            "description": "Get music metadata from Discogs\n",
            "guid": "4ce89c27-d3a1-4e4b-8f5f-4bd9191c857e",
            "imageUrl": "https://repo.jellyfin.org/releases/plugin/images/jellyfin-plugin-discogs.png",
            "name": "Discogs",
            "overview": "Get music metadata from Discogs",
            "owner": "jellyfin",
            "targetAbi": "10.11.0.0",
            "timestamp": "$TIMESTAMP",
            "version": "$VERSION"
          }
          EOF

          cp "$DLL_PATH" "$OUTDIR/"
          (
            cd "$OUTDIR"
            zip -9 -q "$ZIP_NAME" "Jellyfin.Plugin.Discogs.dll" "meta.json"
            rm -f "Jellyfin.Plugin.Discogs.dll"
            md5sum "$ZIP_NAME" > "discogs_${VERSION}.md5"
            sha256sum "$ZIP_NAME" > "discogs_${VERSION}.sha256"
          )

          CHECKSUM="$(cut -d' ' -f1 "$OUTDIR/discogs_${VERSION}.md5")"
          SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/${ZIP_NAME}"
          MANIFEST_PATH="$OUTDIR/manifest.json"

          cat > "$MANIFEST_PATH" <<EOF
          [
            {
              "guid": "4ce89c27-d3a1-4e4b-8f5f-4bd9191c857e",
              "name": "Discogs",
              "description": "Get music metadata from Discogs\n",
              "overview": "Get music metadata from Discogs",
              "owner": "jellyfin",
              "category": "Music",
              "imageUrl": "https://repo.jellyfin.org/releases/plugin/images/jellyfin-plugin-discogs.png",
              "versions": [
                {
                  "version": "$VERSION",
                  "changelog": "- Jellyfin 10.11 support (#15) @crobibero",
                  "targetAbi": "10.11.0.0",
                  "sourceUrl": "$SOURCE_URL",
                  "checksum": "$CHECKSUM",
                  "timestamp": "$TIMESTAMP"
                }
              ]
            }
          ]
          EOF

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "meta_path=$META_PATH" >> "$GITHUB_OUTPUT"
          echo "md5_path=$OUTDIR/discogs_${VERSION}.md5" >> "$GITHUB_OUTPUT"
          echo "sha256_path=$OUTDIR/discogs_${VERSION}.sha256" >> "$GITHUB_OUTPUT"
          echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --target "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "$TAG" \
            "${{ steps.pkg.outputs.zip_path }}" \
            "${{ steps.pkg.outputs.meta_path }}" \
            "${{ steps.pkg.outputs.md5_path }}" \
            "${{ steps.pkg.outputs.sha256_path }}" \
            "${{ steps.pkg.outputs.manifest_path }}" \
            --repo "$REPO" \
            --clobber

      - name: Publish stable manifest alias (latest)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="latest"
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "Latest manifest" \
              --notes "Rolling manifest pointer for Jellyfin plugin repository."
          fi

          gh release upload "$TAG" \
            "${{ steps.pkg.outputs.manifest_path }}" \
            --repo "$REPO" \
            --clobber
