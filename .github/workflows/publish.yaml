name: '🚀 Publish Plugin'

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag to upload assets to (e.g. v2.0.4)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve tag/version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name || inputs.version }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore Jellyfin.Plugin.Discogs.sln
          dotnet build Jellyfin.Plugin.Discogs.sln -c Release --no-restore

      - name: Package artifacts
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          OUTDIR="dist"
          mkdir -p "$OUTDIR"

          DLL_PATH="Jellyfin.Plugin.Discogs/bin/Release/net9.0/Jellyfin.Plugin.Discogs.dll"
          ZIP_NAME="discogs_${VERSION}.zip"
          ZIP_PATH="$OUTDIR/$ZIP_NAME"

          if [[ ! -f "$DLL_PATH" ]]; then
            echo "Expected plugin DLL not found: $DLL_PATH"
            exit 1
          fi

          cp "$DLL_PATH" "$OUTDIR/"
          (
            cd "$OUTDIR"
            zip -9 -q "$ZIP_NAME" "Jellyfin.Plugin.Discogs.dll"
            rm -f "Jellyfin.Plugin.Discogs.dll"
            md5sum "$ZIP_NAME" > "discogs_${VERSION}.md5"
            sha256sum "$ZIP_NAME" > "discogs_${VERSION}.sha256"
          )

          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          META_PATH="$OUTDIR/meta.json"
          cat > "$META_PATH" <<EOF
          {
            "category": "Music",
            "changelog": "- Jellyfin 10.11 support (#15) @crobibero",
            "description": "Get music metadata from Discogs\n",
            "guid": "4ce89c27-d3a1-4e4b-8f5f-4bd9191c857e",
            "imageUrl": "https://repo.jellyfin.org/releases/plugin/images/jellyfin-plugin-discogs.png",
            "name": "Discogs",
            "overview": "Get music metadata from Discogs",
            "owner": "jellyfin",
            "targetAbi": "10.11.0.0",
            "timestamp": "$TIMESTAMP",
            "version": "$VERSION"
          }
          EOF

          (cd "$OUTDIR" && ls -lh)

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "md5_path=$OUTDIR/discogs_${VERSION}.md5" >> "$GITHUB_OUTPUT"
          echo "sha256_path=$OUTDIR/discogs_${VERSION}.sha256" >> "$GITHUB_OUTPUT"
          echo "meta_path=$META_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          gh release upload "$TAG" \
            "${{ steps.pkg.outputs.zip_path }}" \
            "${{ steps.pkg.outputs.md5_path }}" \
            "${{ steps.pkg.outputs.sha256_path }}" \
            "${{ steps.pkg.outputs.meta_path }}" \
            --repo "${{ github.repository }}" \
            --clobber
