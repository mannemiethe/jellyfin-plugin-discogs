name: '🏷️ Create Release'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true
        type: string
      title:
        description: 'Release title (optional, defaults to tag)'
        required: false
        type: string
      body:
        description: 'Release notes (optional)'
        required: false
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean
      target:
        description: 'Target branch or commit SHA'
        required: false
        default: 'master'
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_TITLE: ${{ inputs.title }}
          INPUT_BODY: ${{ inputs.body }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_TARGET: ${{ inputs.target }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${INPUT_TAG}"
          TITLE="${INPUT_TITLE}"
          BODY="${INPUT_BODY}"
          TARGET="${INPUT_TARGET:-master}"
          PRERELEASE="${INPUT_PRERELEASE:-false}"

          if [[ -z "$TAG" ]]; then
            echo "Input 'tag' is required"
            exit 1
          fi

          if [[ -z "$TITLE" ]]; then
            TITLE="$TAG"
          fi

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release already exists for tag $TAG"
            exit 0
          fi

          EXTRA_ARGS=()
          if [[ "$PRERELEASE" == "true" ]]; then
            EXTRA_ARGS+=(--prerelease)
          fi

          if [[ -n "$BODY" ]]; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --target "$TARGET" \
              --title "$TITLE" \
              --notes "$BODY" \
              "${EXTRA_ARGS[@]}"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --target "$TARGET" \
              --title "$TITLE" \
              --generate-notes \
              "${EXTRA_ARGS[@]}"
          fi

          gh release view "$TAG" --repo "$REPO" --json url --jq .url
