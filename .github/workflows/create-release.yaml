name: '🏷️ Create Release'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true
        type: string
      title:
        description: 'Release title (optional, defaults to tag)'
        required: false
        type: string
      body:
        description: 'Release notes (optional)'
        required: false
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean
      target:
        description: 'Target branch or commit SHA'
        required: false
        default: 'master'
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: actions/github-script@v7
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_TITLE: ${{ inputs.title }}
          INPUT_BODY: ${{ inputs.body }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_TARGET: ${{ inputs.target }}
        with:
          script: |
            const tag = (process.env.INPUT_TAG || '').trim();
            const inputTitle = (process.env.INPUT_TITLE || '').trim();
            const body = (process.env.INPUT_BODY || '').trim();
            const target = (process.env.INPUT_TARGET || 'master').trim();
            const prerelease = (process.env.INPUT_PRERELEASE || 'false') === 'true';
            const name = inputTitle.length > 0 ? inputTitle : tag;

            if (!tag) {
              core.setFailed('Input "tag" is required.');
              return;
            }

            // Idempotency: if release already exists, succeed.
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              core.info(`Release already exists: ${existing.data.html_url}`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const created = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target,
              name,
              body: body || `Release ${tag}`,
              draft: false,
              prerelease,
              generate_release_notes: body.length === 0
            });

            core.info(`Created release: ${created.data.html_url}`);
